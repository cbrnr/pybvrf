name: Check

on:
  pull_request:
    paths-ignore:
      - "docs/**"
  push:
    branches: [main]
  workflow_call:


jobs:
  style:
    name: Check style
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/ruff-action@v3
      - uses: astral-sh/ruff-action@v3
        with:
          args: "format --diff"
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Check license headers
        run: python .github/check_license_headers.py

  check-uv-build:
    name: Check uv_build compatibility
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Get latest uv version
        id: uv-version
        run: |
          LATEST=$(curl -s https://api.github.com/repos/astral-sh/uv/releases/latest | jq -r '.tag_name' | sed 's/^v//')
          echo "version=$LATEST" >> $GITHUB_OUTPUT
          echo "Latest uv version: $LATEST"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install packaging
        run: pip install packaging

      - name: Check uv_build compatibility
        env:
          UV_LATEST_VERSION: ${{ steps.uv-version.outputs.version }}
        run: python .github/check_uv_build.py
