name: Release

on:
  release:
    types: [published]

jobs:
  check:
    uses: ./.github/workflows/check.yml

  test:
    uses: ./.github/workflows/test.yml

  publish:
    name: Publish to PyPI
    needs: [check, test]
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - name: Publish to PyPI
        run: |
          uv build
          uv publish
